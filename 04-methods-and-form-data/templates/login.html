<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Methods and Form Data</title>
  </head>
  <body>
    <h1>Flask Methods and Form Data</h1>

    <h2>POST form</h2>
    <form action="{{ url_for('login') }}" method="post">
      <input type="text" name="nm" placeholder="Enter your name" />
      <button type="submit">Submit with POST</button>
    </form>

    <h2>GET form</h2>
    <form action="{{ url_for('login') }}" method="get">
      <input type="text" name="nm" placeholder="Enter your name" />
      <button type="submit">Submit with GET</button>
    </form>
  </body>
</html>
